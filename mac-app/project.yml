name: MidiFtBridge

options:
  bundleIdPrefix: de.welt
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    GCC_C_LANGUAGE_STANDARD: c11
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_CXX_LIBRARY: "libc++"
    PRODUCT_NAME: "MIDI-FT Bridge"
    PRODUCT_BUNDLE_IDENTIFIER: "de.welt.midiftbridge"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    SWIFT_OBJC_BRIDGING_HEADER: "MidiFtBridge/MidiFtBridge-Bridging-Header.h"
    INFOPLIST_FILE: "MidiFtBridge/Info.plist"
    # Native build: the AVFoundation clip player replaces the FFmpeg one.
    GCC_PREPROCESSOR_DEFINITIONS:
      - "MFB_NATIVE_MACOS=1"
      - "$(inherited)"
    # No Homebrew (FFmpeg / SDL2) — only system frameworks, so the .app is
    # self-contained and runs on any Mac at the deployment target without
    # bundling third-party dylibs.
    HEADER_SEARCH_PATHS:
      - "$(SRCROOT)/../src"
      - "$(SRCROOT)/MidiFtBridge"
    # Code signing for development. Switch to a Developer ID for distribution.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO

targets:
  MidiFtBridge:
    type: application
    platform: macOS
    sources:
      - path: MidiFtBridge
      # C++ engine sources from the parent repo. Linux-only files (alsa/bluez) excluded.
      - path: ../src
        name: Engine
        type: group
        includes:
          - "engine.cpp"
          - "engine.h"
          - "clip_player_macos.mm"
          - "clip_player.h"
          - "ft_sender.cpp"
          - "ft_sender.h"
          - "lodepng.cpp"
          - "lodepng.h"
          - "status_server.cpp"
          - "status_server.h"
          - "midi_input.h"
          - "midi_input_macos.cpp"
          - "audio_player.h"
          - "audio_player_macos_native.cpp"
          - "ble_sender.h"
          - "ble_sender_macos.mm"
          - "config.h"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: CoreMedia.framework
      - sdk: CoreVideo.framework
      - sdk: CoreMIDI.framework
      - sdk: CoreFoundation.framework
      - sdk: AppKit.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreBluetooth.framework
    info:
      path: MidiFtBridge/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "Send video frames to iPixel BLE LED panels."
        # xcodegen regenerates Info.plist from this block, so the version must
        # live here (editing Info.plist directly gets overwritten on generate).
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"

schemes:
  MidiFtBridge:
    build:
      targets:
        MidiFtBridge: all
    # Run/Profile/Archive use Release by default; tests/analyze stay Debug.
    run:
      config: Release
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
